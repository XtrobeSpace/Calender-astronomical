name: Nightly Calendar Update

on:
  schedule:
    - cron: "0 1 * * *"
    - cron: "0 2 1 1 *"
  workflow_dispatch:
    inputs:
      run_type:
        description: "What to run"
        required: true
        default: "daily"
        type: choice
        options: 
          - daily
          - static
          - both

permissions:
  contents: write

jobs:
  update:
    name: Generate & Publish Calendar Data
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Cache Skyfield ephemeris (de421.bsp)
        uses: actions/cache@v4
        with:
          path: skyfield_cache
          key: skyfield-de421

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine run type
        id: run_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.run_type }}" >> $GITHUB_OUTPUT
          elif [ "$(date +%m%d)" = "0101" ]; then
            echo "type=static" >> $GITHUB_OUTPUT
          else
            echo "type=daily" >> $GITHUB_OUTPUT
          fi

      - name: Run calendar generator
        env:
          NASA_API_KEY_1: ${{ secrets.NASA_API_KEY_1 }}
          NASA_API_KEY_2: ${{ secrets.NASA_API_KEY_2 }}
        run: |
          YEAR=$(date +%Y)
          RUN_TYPE="${{ steps.run_type.outputs.type }}"
          echo "Run type: $RUN_TYPE  |  Year: $YEAR"
          python generate_events_v2.py --type "$RUN_TYPE" --year "$YEAR"

      - name: Verify output files
        run: |
          echo "=== Output directory contents ==="
          ls -lh output/ || echo "No output directory found!"
          if [ "${{ steps.run_type.outputs.type }}" != "static" ]; then
            test -f output/daily_update.json || (echo "daily_update.json missing!" && exit 1)
          fi

      - name: Publish output to data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Back up the generated files to a safe, temporary directory
          mkdir -p /tmp/data_output
          cp -a output/. /tmp/data_output/
          
          # 2. Switch to a completely empty 'data' branch
          git checkout --orphan data
          
          # 3. Nuke everything from the old branch (including .gitignore)
          git rm -rf . || true
          git clean -fdx || true
          
          # 4. Bring our fresh JSON files back
          cp -a /tmp/data_output/. .
          
          # 5. Commit and force-push
          git add .
          git commit -m "chore: calendar update $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "No changes to commit"
          git push origin data --force
